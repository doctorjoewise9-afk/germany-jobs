<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Work and Settle in Germany</title>  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ffffff, #f5f5f5);
      overflow-x: hidden;
    }

    header {
      text-align: center;
      padding: 20px;
      animation: fadeDown 1s ease-in-out;
    }

    header h1 {
      font-size: 2.5rem;
    }

    header span {
      color: red;
    }

    .urgent {
      background: #ddd;
      display: inline-block;
      padding: 8px 20px;
      margin-top: 10px;
      font-weight: bold;
      animation: pulse 1.5s infinite;
    }

    .container {
      display: flex;
      justify-content: space-around;
      align-items: center;
      flex-wrap: wrap;
      padding: 20px;
    }

    .jobs {
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      animation: fadeIn 2s ease;
    }

    .jobs h2 {
      border-bottom: 3px solid red;
      display: inline-block;
      padding-bottom: 5px;
    }

    .jobs ul {
      list-style: none;
      padding: 0;
    }

    .jobs li {
      margin: 10px 0;
      font-weight: bold;
      transform: translateX(-20px);
      opacity: 0;
      animation: slideIn 0.5s forwards;
    }

    .jobs li:nth-child(1) { animation-delay: 0.2s; }
    .jobs li:nth-child(2) { animation-delay: 0.4s; }
    .jobs li:nth-child(3) { animation-delay: 0.6s; }
    .jobs li:nth-child(4) { animation-delay: 0.8s; }
    .jobs li:nth-child(5) { animation-delay: 1s; }
    .jobs li:nth-child(6) { animation-delay: 1.2s; }
    .jobs li:nth-child(7) { animation-delay: 1.4s; }
    .jobs li:nth-child(8) { animation-delay: 1.6s; }
    .jobs li:nth-child(9) { animation-delay: 1.8s; }

    .image {
      animation: float 3s ease-in-out infinite;
    }

    .image img {
      width: 300px;
    }

    footer {
      background: #111;
      color: white;
      text-align: center;
      padding: 20px;
      margin-top: 20px;
      animation: fadeUp 1.5s ease;
    }

    button {
      padding: 10px 20px;
      border: none;
      background: red;
      color: white;
      cursor: pointer;
      margin-top: 10px;
      border-radius: 5px;
    }

    button:hover {
      background: black;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideIn {
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    @keyframes float {
      0% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0); }
    }
  </style></head>
<body><header>
  <h1>WORK AND SETTLE IN <span>GERMANY</span></h1>
  <div class="urgent">URGENT HIRING</div>
</header><div class="container">  <div class="jobs">
    <h2>AVAILABLE JOBS</h2>
    <ul>
      <li>Facade Worker</li>
      <li>Plumber</li>
      <li>Electrician</li>
      <li>Welder</li>
      <li>Painter / Plasterer</li>
      <li>Tiler</li>
      <li>Mason</li>
      <li>Concreter</li>
      <li>Roofer</li>
    </ul><button onclick="applyNow()">Apply Now</button>

  </div>  <div class="image">
    <img src="https://i.imgur.com/6VBx3io.png" alt="Worker">
  </div></div><footer>
  <p>Contact: 0530767883 | 0208636267</p>
  <p>Email: info@fraguaglobal.com</p>
</footer><script>
  function applyNow() {
    alert("Application portal coming soon!");
  }
</script></body>
  </html>
